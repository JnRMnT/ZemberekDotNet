# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: 'windows-latest'

steps:
- task: DotNetCoreCLI@2
  displayName: Restore NuGet Packages
  inputs:
    command: 'restore'
    projects: '**/*.sln'
    feedsToUse: 'select'
    vstsFeed: 'dbf777b3-aa03-4952-92dc-55f20eba6724/5d5f458d-6d34-429b-97f8-2d53fc2c2c95'
- task: DotNetCoreCLI@2
  inputs:
    command: 'build'
    projects: '**/*.csproj'
  displayName: Build Solution
- task: DotNetCoreCLI@2
  inputs:
    command: 'test'
    projects: |
      **/*Tests.csproj
      !**/ZemberekDotNet.All.Tests.csproj
    arguments: '--collect "Code coverage" --logger "trx"'
    publishTestResults: true
  displayName: Run Tests
- task: CopyFiles@2
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)'
    Contents: '**/*.nupkg'
    TargetFolder: '$(Build.ArtifactStagingDirectory)'
    flattenFolders: true
  displayName: Copy Packages To Artifacts Folder
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'
  displayName: Publish Artifacts