name: Sync docs to GitHub Wiki

on:
  push:
    branches: [master]
    paths:
      - docs/**

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone wiki repo
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki

      - name: Copy docs into wiki (flat - wiki has no subdirectories)
        run: |
          cp docs/*.md wiki/
          # Rename the docs index to Home.md (wiki landing page)
          if [ -f wiki/README.md ]; then
            mv wiki/README.md wiki/Home.md
          fi

      - name: Commit and push wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Sync wiki from docs/ [skip ci]"
          git push
